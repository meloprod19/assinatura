<!DOCTYPE html>
<html dir="ltr" lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap"
    />
    <style>
      body {
        font-family: "Poppins", sans-serif;
        background-color: white;
      }

      table {
        border-collapse: collapse;
        background-color: #ff5e29;
      }

      .logo-cell {
        padding-right: 10px;
        max-width: 150px;
      }

      .header-cell {
        background-color: #ff5e29;
        padding-left: 16px;
        padding-top: 12px;
        justify-content: flex-end;
        vertical-align: bottom;
      }

      .header-text {
        font-size: 18px;
        font-weight: 700;
        color: white;
      }

      .italic-cell {
        background-color: #ff5e29;
        padding-left: 18px;
        padding-bottom: 10px;
        font-style: italic;
      }

      .italic-text {
        font-size: 14px;
        color: white;
      }

      .contact-cell {
        background-color: #ff5e29;
        padding-left: 16px;
      }

      .contact-text {
        font-size: 14px;
        color: white;
        text-decoration: none !important;
        font-weight: lighter;
      }

      .address-cell {
        background-color: #ff5e29;
        padding-left: 16px;
        line-height: 0.8;
      }

      .address-text {
        font-size: 10px;
        font-weight: 400;
        color: black;
        font-style: italic;
        text-decoration: none !important;
      }
    </style>

  </head>
  <body>
    <table cellpadding="0" cellspacing="0">
      <tbody>
        <tr>
          <td rowspan="5" style="background-color: white;">
            <img
            class="logo-cell"
              src="assets/meloLeftImage.png"
            />
          </td>
          <td colspan="9" class="header-cell">
            <a class="header-text">Vitor Sarkis El Atra</a>
          </td>
        </tr>
        <tr>
          <td colspan="9" class="italic-cell">
            <a class="italic-text">Fundador</a>
          </td>
        </tr>
        <tr>
          <td colspan="9" class="contact-cell">
            <a
              href="https://api.whatsapp.com/send?phone=5511954387151"
              class="contact-text"
              target="_blank"
              >+55 11 95438-7151</a
            >
          </td>
        </tr>
        <tr>
          <td colspan="9" class="contact-cell">
            <a
              class="contact-text"
              href="mailto:contato@meloproducoes.com.br"
              target="_blank"
              >contato@meloproducoes.com.br</a
            >
          </td>
        </tr>
        <tr>
          <td colspan="9" class="address-cell">
            <a
              href="https://g.co/kgs/fXTQHjF"
              class="address-text"
              href=""
              target="_blank"
              >R. Conde do Pinhal 8, Sala 102 - Liberdade<br />
              CNPJ: 35.793.194/0001-04 | CNPJ: 47.878.847/0001-37<br />
              Melo Produções - MEI</a
            >
          </td>
          <td>
            <img src="https://raw.githubusercontent.com/meloprod19/assinatura/main/assets/meloBird2.png" style="height: 80px;"/>
          </td>
        </tr>
      </tbody>
    </table>
  </body>
</html>
